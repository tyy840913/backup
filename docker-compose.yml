服务：:
  # Portainer - 容器管理面板# Portainer - 容器管理面板
  端口管理器::
    镜像: docker.1ms.run/6053537/portainer-ce:最新: docker.1ms.run/6053537/portainer-ce:latest
    容器名称: portainer: portainer
    重启：始终: always
    网络模式: 桥接: bridge
    卷::
      - /var/run/docker.sock:/var/run/docker.sock/var/run/docker.sock:/var/run/docker.sock
    端口::
      - "9000:9000""9000:9000"

  # Watchtower - 自动更新容器# Watchtower - 自动更新容器
  瞭望塔::
    镜像: docker.1ms.run/containrrr/watchtower:最新: docker.1ms.run/containrrr/watchtower:latest
    容器名称: watchtower: watchtower
    重启：始终: always
    网络模式：主机: host
    卷::
      - /var/run/docker.sock:/var/run/docker.sock/var/run/docker.sock:/var/run/docker.sock
    环境::
      - TZ=亚洲/上海TZ=Asia/Shanghai
    命令: --schedule "0 30 5 * * *" --cleanup --remove-volumes: --schedule "0 30 5 * * *" --cleanup --remove-volumes

  # openlist - 文件列表服务# openlist - 文件列表服务
  开放列表::
    镜像: docker.1ms.run/openlistteam/openlist:最新: docker.1ms.run/openlistteam/openlist:latest
    容器名称: openlist: openlist
    重启：始终: always
    网络模式: 桥接: bridge
    用户: "1001:1001": "1001:1001"
    卷::
      - /docker_data/openlist:/opt/openlist/data/docker_data/openlist:/opt/openlist/data
    端口::
      - "5244:5244""5244:5244"
    环境::
      - TZ=Asia/Shanghai
      - UMASK=022

  # Lucky - 反向代理工具（Host 网络）
  lucky:
    image: docker.1ms.run/gdy666/lucky:3.0.0
    container_name: lucky
    restart: always
    network_mode: host
    volumes:
      - /docker_data/luckyconf:/app/conf
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Asia/Shanghai

  # Vaultwarden - 密码管理服务
  vaultwarden:
    image: docker.1ms.run/vaultwarden/server:latest
    container_name: vaultwarden
    restart: always
    network_mode: bridge
    volumes:
      - /docker_data/bitwarden:/data
    ports:
      - "8081:80"
    environment:
      - TZ=Asia/Shanghai
      - WEB_VAULT_ENABLED=true
      - SIGNUPS_ALLOWED=true 

  # xiaoya - 小雅Alist服务
  xiaoya:
    image: docker.1ms.run/xiaoyaliu/alist:latest
    container_name: xiaoya
    restart: always
    privileged: true
    network_mode: bridge
    volumes:
      - /etc/xiaoya:/data
      - /etc/xiaoya/data:/www/data
    ports:
      - "5678:80"
    environment:
      - TZ=Asia/Shanghai

  # mihomo 代理
  mihomo:
    image: docker.1ms.run/metacubex/mihomo:latest
    container_name: mihomo
    restart: always
    network_mode: host
    volumes:
      - /etc/mihomo:/root/.config/mihomo
